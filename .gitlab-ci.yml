stages:
  - test
  - build

test:
  stage: test
  tags:
    - clipDEV
  image: node:20-alpine
  script:
    - npm ci
    - npm run test

echo_smoke:
  stage: test
  tags:
    - clipDEV
  script:
    - echo "CI smoke check on dev runner"

build_image:
  stage: build
  tags:
    - dev
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t clipmate:latest .
